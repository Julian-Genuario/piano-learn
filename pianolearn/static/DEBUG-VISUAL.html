<!DOCTYPE html>
<html>
<head>
    <title>DEBUG - Ver qué está pasando</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: monospace;
            padding: 20px;
            font-size: 12px;
        }
        #log {
            background: #000;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            margin: 10px 0;
        }
        .debug-line {
            margin: 2px 0;
            padding: 2px 5px;
        }
        .right { color: #1E90FF; }
        .left { color: #00C853; }
        .error { color: #ff5555; }
        .info { color: #aaa; }
        h1 { color: #1E90FF; }
        h2 { color: #00C853; margin-top: 20px; }
        pre { background: #111; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>DEBUG - Monitor de WebSocket</h1>
    <p>Este debug muestra exactamente qué datos está recibiendo el navegador</p>

    <h2>Log de eventos:</h2>
    <div id="log"></div>

    <h2>Últimos datos recibidos:</h2>
    <pre id="latest"></pre>

    <h2>Estadísticas:</h2>
    <div id="stats"></div>

    <script>
        let messageCount = 0;
        let rightCount = 0;
        let leftCount = 0;
        let lastData = null;

        function log(text, type = 'info') {
            const logEl = document.getElementById('log');
            const line = document.createElement('div');
            line.className = `debug-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        log('Iniciando debug...', 'info');

        // Conectar al WebSocket
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${location.host}/ws/player`);

        ws.onopen = () => {
            log('WebSocket conectado!', 'right');
        };

        ws.onerror = (e) => {
            log(`WebSocket error: ${e}`, 'error');
        };

        ws.onclose = () => {
            log('WebSocket cerrado', 'error');
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                lastData = data;
                messageCount++;

                // Contar manos en upcoming
                const upcomingRight = data.upcoming.filter(n => n.hand === 'right').length;
                const upcomingLeft = data.upcoming.filter(n => n.hand === 'left').length;
                rightCount += upcomingRight;
                leftCount += upcomingLeft;

                // Log
                if (messageCount % 10 === 0) { // Log cada 10 mensajes
                    const activeRight = data.active.filter(n => n.hand === 'right').length;
                    const activeLeft = data.active.filter(n => n.hand === 'left').length;

                    log(
                        `Msg #${messageCount}: Active ${activeRight} right + ${activeLeft} left, ` +
                        `Upcoming ${upcomingRight} right + ${upcomingLeft} left`,
                        upcomingRight > 0 && upcomingLeft > 0 ? 'info' :
                        upcomingRight > 0 ? 'right' :
                        upcomingLeft > 0 ? 'left' : 'error'
                    );
                }

                // Mostrar últimos datos
                if (messageCount % 5 === 0) {
                    document.getElementById('latest').textContent = JSON.stringify(data, null, 2);
                }

                // Actualizar estadísticas
                document.getElementById('stats').innerHTML = `
                    <p>Mensajes recibidos: ${messageCount}</p>
                    <p>Total notas derecha vistas: <span class="right">${rightCount}</span></p>
                    <p>Total notas izquierda vistas: <span class="left">${leftCount}</span></p>
                    ${rightCount === 0 ? '<p class="error">ERROR: No hay notas derecha!</p>' : ''}
                    ${leftCount === 0 ? '<p class="error">ERROR: No hay notas izquierda!</p>' : ''}
                    ${rightCount > 0 && leftCount > 0 ? '<p class="right">✓ Los dos colores están presentes!</p>' : ''}
                `;

                // Si vemos mucho tiempo sin cambios
                if (messageCount === 100 && rightCount === 0) {
                    log('ALERTA: Después de 100 mensajes, NO hay notas derecha!', 'error');
                }

            } catch (e) {
                log(`Error parsing JSON: ${e}`, 'error');
            }
        };

        // Simular reproducción
        setTimeout(() => {
            log('Intentando reproducir canción...', 'info');
            fetch(`/api/player/play/Pokemon%20-%20%C2%A1Atrapalo`, { method: 'POST' })
                .then(r => r.json())
                .then(d => log(`Reproduciendo: ${d.song}`, 'right'))
                .catch(e => log(`Error al reproducir: ${e}`, 'error'));
        }, 1000);

    </script>
</body>
</html>
