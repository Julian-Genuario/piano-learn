<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PianoLearn - MIDI Extractor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; color: #4fc3f7; }
        .subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        input[type="text"], input[type="url"] {
            width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px;
            background: #0f3460; color: #fff; font-size: 16px; margin-bottom: 16px;
        }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .checkbox-row input { width: 18px; height: 18px; }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: #4fc3f7; color: #1a1a2e; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #81d4fa; }
        button:disabled { background: #555; cursor: not-allowed; }
        .progress { margin-top: 24px; padding: 16px; background: #0f3460; border-radius: 8px; display: none; }
        .progress.active { display: block; }
        .progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.5s; border-radius: 3px; }
        .status-text { font-size: 14px; color: #aaa; }
        .result { margin-top: 16px; padding: 12px; background: #1b5e20; border-radius: 8px; display: none; }
        .result.active { display: block; }
        .result.error { background: #b71c1c; }
        .history { margin-top: 24px; border-top: 1px solid #333; padding-top: 16px; }
        .history h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
        .history-item { padding: 8px 0; font-size: 13px; color: #aaa; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PianoLearn</h1>
        <p class="subtitle">MIDI Extractor</p>
        <form id="extractForm">
            <label for="url">URL de YouTube</label>
            <input type="url" id="url" placeholder="https://youtube.com/watch?v=..." required>
            <label for="name">Nombre de la cancion</label>
            <input type="text" id="name" placeholder="Fur Elise (opcional)">
            <div class="checkbox-row">
                <input type="checkbox" id="separate">
                <label for="separate" style="margin:0">Separar piano (varios instrumentos)</label>
            </div>
            <button type="submit" id="submitBtn">Extraer MIDI</button>
        </form>
        <div class="progress" id="progress">
            <p class="status-text" id="statusText">Iniciando...</p>
            <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
        </div>
        <div class="result" id="result"></div>
        <div class="history" id="history"><h3>Conversiones recientes</h3></div>
    </div>
    <script>
        const form = document.getElementById('extractForm');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const historyDiv = document.getElementById('history');
        const progressMap = {
            'Starting...': 5, 'Downloading audio...': 20, 'Separating piano with demucs...': 40,
            'Transcribing to MIDI...': 70, 'Cleaning up...': 90, 'Syncing to Pi...': 95, 'Complete!': 100
        };
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            progress.classList.add('active');
            resultDiv.classList.remove('active');
            const body = {
                url: document.getElementById('url').value,
                name: document.getElementById('name').value || null,
                separate: document.getElementById('separate').checked
            };
            const res = await fetch('/extract', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const { job_id } = await res.json();
            pollStatus(job_id, body.name || body.url);
        });
        async function pollStatus(jobId, songName) {
            const res = await fetch(`/status/${jobId}`);
            const data = await res.json();
            statusText.textContent = data.progress || data.status;
            progressFill.style.width = (progressMap[data.progress] || 50) + '%';
            if (data.status === 'done') {
                submitBtn.disabled = false;
                resultDiv.textContent = `MIDI generado: ${data.midi_path}` + (data.synced ? ' (sincronizado a Pi)' : ' (solo local)');
                resultDiv.classList.add('active');
                resultDiv.classList.remove('error');
                addHistory(songName);
                return;
            }
            if (data.status === 'error') {
                submitBtn.disabled = false;
                resultDiv.textContent = `Error: ${data.progress}`;
                resultDiv.classList.add('active', 'error');
                return;
            }
            setTimeout(() => pollStatus(jobId, songName), 1000);
        }
        function addHistory(name) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = `${name} - ${new Date().toLocaleTimeString()}`;
            historyDiv.appendChild(item);
        }
    </script>
</body>
</html>
