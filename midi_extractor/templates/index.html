<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PianoLearn - MIDI Extractor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; color: #4fc3f7; }
        .subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        input[type="text"], input[type="url"] {
            width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px;
            background: #0f3460; color: #fff; font-size: 16px; margin-bottom: 16px;
        }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .checkbox-row input { width: 18px; height: 18px; }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: #4fc3f7; color: #1a1a2e; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #81d4fa; }
        button:disabled { background: #555; cursor: not-allowed; }
        .progress { margin-top: 24px; padding: 16px; background: #0f3460; border-radius: 8px; display: none; }
        .progress.active { display: block; }
        .progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.5s; border-radius: 3px; }
        .status-text { font-size: 14px; color: #aaa; }
        .timer { font-size: 12px; color: #666; margin-top: 6px; }
        .result { margin-top: 16px; padding: 12px; background: #1b5e20; border-radius: 8px; display: none; font-size: 14px; }
        .result.active { display: block; }
        .result.error { background: #b71c1c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PianoLearn</h1>
        <p class="subtitle">MIDI Extractor - YouTube a MIDI</p>
        <form id="extractForm">
            <label for="url">URL de YouTube</label>
            <input type="url" id="url" placeholder="https://youtube.com/watch?v=..." required>
            <label for="name">Nombre de la cancion</label>
            <input type="text" id="name" placeholder="Fur Elise (opcional)">
            <div class="checkbox-row">
                <input type="checkbox" id="separate">
                <label for="separate" style="margin:0">Separar piano (mas lento, para videos con varios instrumentos)</label>
            </div>
            <button type="submit" id="submitBtn">Extraer MIDI</button>
        </form>
        <div class="progress" id="progress">
            <p class="status-text" id="statusText">Iniciando...</p>
            <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
            <p class="timer" id="timer"></p>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script>
        const form = document.getElementById('extractForm');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const timerEl = document.getElementById('timer');
        let startTime = 0;
        let timerInterval = null;

        const progressMap = {
            'Starting...': 5,
            'Downloading audio...': 20,
            'Separating piano with demucs...': 40,
            'Transcribing to MIDI...': 60,
            'Cleaning up...': 90,
            'Syncing to Pi...': 95,
            'Complete!': 100,
            'Done!': 100
        };

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timerEl.textContent = `Tiempo: ${formatTime(elapsed)}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function reset() {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Extraer MIDI';
            progress.classList.remove('active');
            stopTimer();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Extrayendo...';
            progress.classList.add('active');
            resultDiv.classList.remove('active');
            startTimer();

            const body = {
                url: document.getElementById('url').value,
                name: document.getElementById('name').value || null,
                separate: document.getElementById('separate').checked
            };

            try {
                const res = await fetch('/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                pollStatus(data.job_id);
            } catch (err) {
                showError('No se pudo conectar al servidor');
            }
        });

        async function pollStatus(jobId) {
            try {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();

                statusText.textContent = data.progress || data.status;
                progressFill.style.width = (progressMap[data.progress] || 50) + '%';

                if (data.status === 'done') {
                    stopTimer();
                    const elapsed = formatTime((Date.now() - startTime) / 1000);
                    resultDiv.textContent = `MIDI generado: ${data.midi_path} (${elapsed})`;
                    resultDiv.classList.add('active');
                    resultDiv.classList.remove('error');
                    reset();
                    return;
                }

                if (data.status === 'error') {
                    showError(data.progress);
                    return;
                }

                setTimeout(() => pollStatus(jobId), 2000);
            } catch (err) {
                showError('Se perdio la conexion con el servidor');
            }
        }

        function showError(msg) {
            stopTimer();
            resultDiv.textContent = `Error: ${msg}`;
            resultDiv.classList.add('active', 'error');
            reset();
        }
    </script>
</body>
</html>
